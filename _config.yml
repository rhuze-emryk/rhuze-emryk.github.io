# Site settings
title: NeuroFlow Labs
description: Making technology work with your brain, not against it
email: your-email@example.com
baseurl: ""
url: "https://rhuze-emryk.github.io"
logo: "/assets/images/logo.png"
repository: "rhuze-emryk/rhuze-emryk.github.io"

# Theme settings
theme: jekyll-theme-basically-basic
skin: default

# Build settings
markdown: kramdown
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

# Collections
collections:
  guides:
    output: true
    permalink: /:collection/:path/
  references:
    output: true
    permalink: /:collection/:path/
  reviews:
    output: true
    permalink: /:collection/:path/
  blog:
    permalink: /blog/:year/:month/:day/:title/
